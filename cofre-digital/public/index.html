<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O Cofre Digital - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="auth-box">
            <h1 id="auth-title">O Cofre Digital</h1>
            <div id="message" class="hidden"></div>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="login-email">E-mail</label>
                    <input type="email" id="login-email" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Senha</label>
                    <input type="password" id="login-password" required>
                </div>
                <button type="submit">Entrar</button>
                <p class="toggle-link">Não tem conta? <a href="#" id="show-register">Criar conta</a></p>
            </form>

            <form id="register-form" class="hidden">
                <div class="form-group">
                    <label for="reg-name">Nome Completo</label>
                    <input type="text" id="reg-name" required>
                </div>
                <div class="form-group">
                    <label for="reg-email">E-mail</label>
                    <input type="email" id="reg-email" required>
                </div>
                <div class="form-group">
                    <label for="reg-password">Senha</label>
                    <input type="password" id="reg-password" required>
                </div>
                <button type="submit">Cadastrar</button>
                <p class="toggle-link">Já tem conta? <a href="#" id="show-login">Fazer login</a></p>
            </form>
        </div>
        <footer>
            <p>Desenvolvido por Leonardo Estevão Alves — Registro Acadêmico: 00250458</p>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
